<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>第一代國民健康操 - 後台管理系統</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;800&family=VT323&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --vintage-paper: #f4edd9;
      --vintage-paper-dark: #e8dfc5;
      --vintage-ink: #19385c;
      --vintage-red: #c64b36;
      --vintage-red-glow: rgba(198, 75, 54, 0.3);
      --vintage-green: #2b6b3e;
      --vintage-green-glow: rgba(43, 107, 62, 0.3);
      --vintage-yellow: #e5a93b;
      
      --font-serif: 'Noto Serif TC', serif;
      --font-mono: 'VT323', monospace;
      --font-sans: 'Outfit', sans-serif;
      --border-retro: 3px solid var(--vintage-ink);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: var(--vintage-paper);
      color: var(--vintage-ink);
      font-family: var(--font-serif);
      min-height: 100vh;
      padding: 20px;
      background-image: 
        radial-gradient(circle, rgba(25, 56, 92, 0.03) 1px, transparent 1px);
      background-size: 20px 20px;
    }

    .app-container {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* 頂部導覽列 */
    .main-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 25px;
      background: var(--vintage-paper-dark);
      border: var(--border-retro);
      border-radius: 8px;
      box-shadow: 3px 3px 0px var(--vintage-ink);
    }

    .logo-section {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-section h1 {
      font-size: 1.4rem;
      font-weight: 850;
      color: var(--vintage-ink);
      letter-spacing: 1px;
    }

    .badge {
      font-size: 0.8rem;
      font-weight: 800;
      padding: 2px 10px;
      background-color: var(--vintage-red);
      color: white;
      border: 2px solid var(--vintage-ink);
      border-radius: 4px;
      box-shadow: 1px 1px 0px var(--vintage-ink);
    }

    .btn {
      font-family: var(--font-serif);
      font-size: 0.9rem;
      font-weight: 800;
      padding: 8px 16px;
      border-radius: 6px;
      border: 2px solid var(--vintage-ink);
      cursor: pointer;
      text-decoration: none;
      transition: all 0.1s ease;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background-color: var(--vintage-yellow);
      color: var(--vintage-ink);
      box-shadow: 2px 2px 0px var(--vintage-ink);
    }

    .btn:active {
      transform: translate(2px, 2px);
      box-shadow: none;
    }

    .outline-btn {
      background: #faf7eb;
    }

    .danger-btn {
      background: var(--vintage-red);
      color: white;
      font-size: 0.75rem;
      padding: 2px 8px;
      border-radius: 4px;
      box-shadow: 1px 1px 0px var(--vintage-ink);
    }

    /* 統計網格 */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 20px;
    }

    .stat-card {
      background-color: #12100f;
      border: var(--border-retro);
      border-radius: 8px;
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 16px;
      box-shadow: 3px 3px 0px var(--vintage-ink);
    }

    .stat-icon {
      font-size: 2.2rem;
      width: 50px;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .stat-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .stat-label {
      font-size: 0.75rem;
      font-weight: 800;
      color: #a8a29e;
      letter-spacing: 0.5px;
    }

    /* VT323 LED字體 */
    .stat-val {
      font-family: var(--font-mono);
      font-size: 2.4rem;
      line-height: 1;
      color: #4ade80;
      text-shadow: 0 0 8px rgba(74, 222, 128, 0.6);
    }

    .stat-card.blue-glow .stat-val {
      color: #60a5fa;
      text-shadow: 0 0 8px rgba(96, 165, 250, 0.6);
    }

    .stat-card.red-glow .stat-val {
      color: #fca5a5;
      text-shadow: 0 0 8px rgba(252, 165, 165, 0.6);
    }

    /* 主要版面 */
    .main-grid {
      display: grid;
      grid-template-columns: 1.5fr 1fr;
      gap: 20px;
    }

    @media (max-width: 1024px) {
      .main-grid {
        grid-template-columns: 1fr;
      }
    }

    .card {
      background: #fcfaf2;
      border: var(--border-retro);
      border-radius: 8px;
      padding: 20px;
      box-shadow: 3px 3px 0px var(--vintage-ink);
    }

    .section-title {
      font-size: 1.1rem;
      font-weight: 800;
      margin-bottom: 15px;
      border-bottom: 2px dashed rgba(25, 56, 92, 0.2);
      padding-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    /* 表格樣式 */
    .table-container {
      width: 100%;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
    }

    th, td {
      padding: 12px 14px;
      font-size: 0.85rem;
      border-bottom: 1px solid rgba(25, 56, 92, 0.1);
    }

    th {
      font-weight: 800;
      color: var(--vintage-ink);
      background-color: var(--vintage-paper-dark);
      border-bottom: 2px solid var(--vintage-ink);
    }

    tbody tr {
      transition: background-color 0.1s ease;
    }

    tbody tr:hover {
      background-color: rgba(25, 56, 92, 0.03);
    }

    tbody tr.active-row {
      background-color: rgba(229, 169, 59, 0.15);
      border-left: 4px solid var(--vintage-yellow);
    }

    .table-empty {
      text-align: center;
      color: #78909c;
      font-style: italic;
      padding: 30px 0;
    }

    .score-green { color: var(--vintage-green); font-weight: 800; }
    .score-yellow { color: #d97706; font-weight: 800; }
    .score-red { color: var(--vintage-red); font-weight: 800; }

    /* 詳細日誌卡片 */
    .details-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #78909c;
      font-style: italic;
      height: 250px;
      text-align: center;
      gap: 15px;
    }

    .user-info-card {
      background: rgba(25, 56, 92, 0.04);
      border: 1px solid rgba(25, 56, 92, 0.1);
      border-radius: 6px;
      padding: 12px 15px;
      margin-bottom: 15px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .info-item {
      display: flex;
      flex-direction: column;
    }

    .info-label {
      font-size: 0.75rem;
      color: #64748b;
      font-weight: 800;
    }

    .info-val {
      font-size: 0.9rem;
      font-weight: 800;
    }

    .table-scroll {
      max-height: 450px;
      overflow-y: auto;
    }
  </style>
</head>
<body>
  <div class="app-container">
    <!-- 頂部導覽列 -->
    <header class="main-header">
      <div class="logo-section">
        <h1>📻 第一代國民健康操</h1>
        <span class="badge">後台管理中心</span>
      </div>
      <div>
        <a href="index.html" class="btn outline-btn">
          返回運動端
        </a>
      </div>
    </header>

    <!-- 總統計數據區 -->
    <section class="stats-grid">
      <div class="stat-card blue-glow">
        <div class="stat-icon">👥</div>
        <div class="stat-info">
          <span class="stat-label">註冊做操人數</span>
          <span id="stat-total-users" class="stat-val">0</span>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">🔥</div>
        <div class="stat-info">
          <span class="stat-label">累積做操次數</span>
          <span id="stat-total-workouts" class="stat-val">0</span>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">⚡</div>
        <div class="stat-info">
          <span class="stat-label">動作完成總次數</span>
          <span id="stat-total-reps" class="stat-val">0</span>
        </div>
      </div>
      <div class="stat-card red-glow">
        <div class="stat-icon">⭐</div>
        <div class="stat-info">
          <span class="stat-label">做操歷史平均分</span>
          <span id="stat-avg-score" class="stat-val">0</span>
        </div>
      </div>
    </section>

    <!-- 主要內容區 -->
    <section class="main-grid">
      <!-- 左側：使用者名冊列表 -->
      <div class="card">
        <div class="section-title">
          <span>📋 註冊做操選手名冊</span>
        </div>
        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th>選手姓名</th>
                <th>註冊時間</th>
                <th>累計訓練</th>
                <th>動作總次數</th>
                <th>平均得分</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="users-table-body">
              <tr>
                <td colspan="6" class="table-empty">載入數據中...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- 右側：使用者詳細訓練日誌 -->
      <div class="card">
        <div class="section-title">
          <span>🔎 選手詳細做操日誌</span>
        </div>
        <div id="details-section">
          <div class="details-placeholder">
            <p>請點擊左側列表的「調閱詳情」按鈕以檢視該名做操選手的歷史運動紀錄。</p>
          </div>
        </div>
      </div>
    </section>
  </div>

  <script src="admin.js"></script>
</body>
</html>
